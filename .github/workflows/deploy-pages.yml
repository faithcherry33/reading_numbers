name: Deploy reading_numbers

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 파일 불러오기
        uses: actions/checkout@v6

      - name: 배포 파일 만들기
        run: |
          mkdir -p _site
          cp index.html style.css app.js _site/

          cat > _site/firebase-config.js <<'EOF'
          export const firebaseConfig = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}"
          };

          export const isFirebaseConfigured = Object.values(
            firebaseConfig
          ).every(
            (value) => value && !String(value).includes("YOUR_")
          );
          EOF

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 배포 파일 업로드
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
